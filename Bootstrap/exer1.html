<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Ice-Cream</title>
</head>
<body>
    <div class="control d-flex justify-content-center align-items-center" style="width: 100%; height: 100vh; background-color: pink
    ;">
        <div class="card rounded-5 shadow" style="width: 400px; height: 550px;">
            <div class="img bg-danger w-100 h-50 rounded-5 rounded-bottom-0">
                <img class="w-100 h-100 object-fit-cover p-2 rounded-5" src="https://i.pinimg.com/736x/27/5c/36/275c3612435a0bee5d4b8db31a77ebd5.jpg" alt="">
            </div>
            <div class="des p-3">
                <h2 class="fs-3">Strawberry Ice Cream</h2>
                <div class="d-flex gap-4">
                    <p>Vegan</p>
                    <p>Glutan Free</p>
                    <p>Organic</p>
                </div>
                <p class="fs-5">Lorem ipsum dolor consectetur.</p>
                <div class="d-flex gap-3">
                    <span>Toppings</span>
                    <div class="px-1 border border-1 rounded-4">Choco Chip</div>
                    <div class="px-1 border border-1 rounded-4">Nuts</div>
                </div>
                <div class="d-flex mt-3">
                    <div class="d-block">
                        <h3 class="text-danger">$10.00</h3>
                        <p>+$2 delivery</p>
                    </div>
                    <button style="width: 230px; height: 50px;" class="border-0 mt-2 bg-danger rounded-5 ms-4">
                        <span class="fs-5 fw-bold text-light">Add to cart</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
