<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="d-flex justify-content-center">
        <div class="form-control w-50 mt-5 shadow">
            <h1 class="text-center">Form</h1>
            <label for="id" class="form-label">ID</label>
            <input type="text" placeholder="Enter ID" class="form-control mb-3" id="id">
            <label for="name" class="form-label">Name</label>
            <input type="text" placeholder="Enter Name" class="form-control mb-3" id="name">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-select mb-3" aria-label="Default select example" id="gender     ">
                <option disabled selected>Select Gender</option>
                <option value="1">Male</option>
                <option value="2">Female</option>
                <option value="3">Other</option>
            </select>
            <label for="email" class="form-label">Email</label>
            <input type="email" placeholder="Enter Email" class="form-control mb-3" id="email">
            <div class="btn d-flex justify-content-center">
                <button class="btn btn-primary">Submit</button>
            </div>
        </div>
    </div>
</body>
</html>
