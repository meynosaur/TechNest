    <!-- Button trigger modal -->
    <button type="button" class="btn btn-info mt-5" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
        Launch static backdrop modal
    </button>
    <!-- Modal -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h1 class="modal-title fs-5 " id="staticBackdropLabel">Staff Information</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control border-outer-none shadow-none border-info" id="username">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control border-outer-none shadow-none border-info" id="email">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control border-outer-none shadow-none border-info" id="password">
                    <Label class="form-label ">Select gender</Label>
                    <select class="form-select border-outer-none shadow-none border-info" aria-label="Default select example">
                        <option disabled selected>Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                    <label for="date" class="form-label">Date of Birth</label>
                    <input type="date" class="form-control border-outer-none shadow-none border-info" id="date">
                    <label for="file" class="form-label mt-1">Upload File</label>
                    <input type="file" class="form-control border-outer-none shadow-none border-info" id="file">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-warning">Update</button>
                    <button type="button" class="btn btn-info">Submit</button>
                </div>
            </div>
        </div>
    </div>
