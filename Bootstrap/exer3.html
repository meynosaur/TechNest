<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="control w-100 d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #c4a083;">
        <div class="form d-flex shadow rounded-5" style="width: 800px; height: 600px; background-color: #F0E9D7;">
            <div class="img w-50 h-100 d-flex justify-content-center align-items-center position-relative">
                <img class="ms-4 rounded-4 shadow" style="width: 360px;" src="https://i.pinimg.com/736x/2a/98/7e/2a987e2ae859e9a39e6e208feb2d6f88.jpg" alt="">
                <div class="desc">
                    <h2 class="fs-4 fw-bold" style="position: absolute; left: 50px; top: 80px; color: #654538">Simplify The Process.</h2>
                    <h2 class="fs-4 fw-bold" style="position: absolute; left: 50px; top: 110px; color: #654538">Supercharge The Results.</h2>
                    <p style="position: absolute; left: 50px; top: 145px; color: #654538">Focus On The Big Picture While We Automate The Daily Details.</p>
                </div>
            </div>
            <div class="w-50 h-100 d-flex flex-column">
                <div class="d-flex align-items-center justify-content-center mt-4">
                    <a href="#" style="color: #654538;" class="fs-2 mt-1"><i class='bx bx-radio-circle-marked'></i></a>
                    <Label class="fs-4 fw-bold" style="color: #654538;">Banano</Label>
                </div>
                <Label style="color: #654538;" class="fs-6 text-center">Login To Your Account</Label>
                <Label style="color: #c4a083; font-size: 15px;" class="mt-1 text-center">Welcome back! Fill in your details to getyou back in</Label>
                <div class="input ms-3">
                    <label class="form-label mt-3 ms-3 d-flex align-items-start" style="color: #654538;">Email</label>
                    <input type="email" class="ms-3 form-control rounded-5 border 1px border-secondary shadow-none" style="width: 85%; height: 40px; background-color: #F0E9D7;" placeholder="Email">
                    <label class="form-label mt-2 ms-3" style="color: #654538;">Password</label>
                    <input type="password" class="ms-3 form-control rounded-5 border 1px border-secondary shadow-none" style="width: 85%; height: 40px; background-color: #F0E9D7;" placeholder="Password">
                    <div class="d-flex justify-content-between">
                        <div>
                            <input class="form-check-input mt-4 ms-3 shadow-none border-0" style="background-color: #654538;" type="checkbox" id="remember">
                            <label class="form-check-label fs-6 ms-1" style="margin-top: 20px; color: #654538;" for="remember"> Remember me</label>
                        </div>
                        <Label class="fs-6 text-decoration-underline" style="margin-top: 20px; padding-right: 40px; color: #654538;" for="forgot-password">Forgot Password?</Label>
                    </div>
                </div>
                <button class="btn btn-primary mt-3 ms-4 rounded-5 d-flex gap-1 align-items-center justify-content-center" style="width: 85%; height: 40px; background-color: #654538; border: none;">
                    <span>Login</span>
                    <a style="padding-top: 1px; color: white;" class="text-decoration-none fs-5" href="#"><i class='bx bx-right-arrow-alt' ></i></a>
                </button>
                <div class="d-flex align-items-center mt-2">
                    <hr style=" margin-left: 20px; width: 100px; color: #654538;">
                    <span class="mx-3" style="color: #654538;">Or continue with</span>
                    <hr style="width: 100px; color: #654538;">
                </div>
                <button class="d-flex align-items-center justify-content-center gap-2 mt-2 ms-4 border-0 rounded-5 bg-light" style="width: 85%; height: 40px;"> 
                    <img class="ms-4" style="width: 25px;" src="mail.png" alt="">
                    <span style="color: #654538;">Sign in with Google</span>
                </button>
                <button class="d-flex align-items-center justify-content-center gap-2 mt-2 ms-4 border-0 rounded-5 bg-light" style="width: 85%; height: 40px;"> 
                    <a class="fs-5" style="color: #654538; " href="#"><i class='bx bxl-apple' ></i></a>
                    <span style="color: #654538;">Sign in with Apple</span>
                </button>
                <Label class="text-center mt-3" style="font-size: 14px;">Don't have an account? <span class="text-decoration-underline" style="color: #654538;">Sign up</span></Label>
            </div>
        </div>
    </div>
</body>
</html>
