<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .background{
        width: 100%;
        height: 100%;
        background-image: url("https://i.pinimg.com/1200x/50/2a/c7/502ac7324861ca8e7ab0d8c605f8a978.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        background-attachment: fixed;
    }
    .background .form{
        width: 400px;
        height: 500px;
        backdrop-filter: blur(20px);
        padding: 20px 40px;
        border-radius: 20px;
        border: hotpink solid 1px;
        box-shadow: rgba(0, 0, 0, 0.1) 0px 10px 50px;
    }
    .form .text{
        margin-top: 30px;
        color: hotpink;
    }
    .text p{
        margin-top: 10px;
        font-size: 18px;
    }
    .form .login{
        margin-top: 20px;
    }
    .login input{
        background-color: transparent;
        border: hotpink solid 1px;
        outline: none;
        width: 100%;
        height: 45px;
        border-radius: 10px;
        padding: 0 20px;
        margin: 10px 0;
    }
    .login input::placeholder{
        color: white;
    }
    .form .rmb{
        margin-top: 10px;
        color: white;
    }
    .rmb input{
        margin-right: 10px;
        cursor: pointer;
    }
    .form .button{
        margin-top: 25px;
        align-items: center;
        display: flex;
        justify-content: center;
    }
    @import url('https://fonts.googleapis.com/css2?family=Bayon&family=Dangrek&family=Fasthand&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=Metal&family=Moul&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
    .button .btt-login{
        width: 40%;
        height: 35px;
        border: hotpink solid 1px;
        border-radius: 20px;
        font-size: 17px;
        font-family: "Lora", serif;
        color: white;
        background-color: rgba(211, 85, 148, 0.582);
        cursor: pointer;
    }
    .btt-login:hover{
        background-color: hotpink;
        color: white;
        transition: 0.3s ease-in-out;
    }
    .form .signup{
        margin-top: 20px;
        text-align: center;
        color: white;
    }
</style>
<body>
    <div class="background">
        <div class="form">
            <div class="text">
                <h2>Login</h2>
                <p>Welcome back! Please enter your details.</p>
            </div>
            <div class="login">
                <div class="username">
                    <input type="text" placeholder="username"><br>
                </div>
                <div class="email">
                    <input type="email" placeholder="email"><br>
                </div>
                <div class="password">
                    <input type="password" placeholder="password">
                </div>
            </div>
            <div class="rmb">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>
            <div class="button">
                <button class="btt-login">Login</button>
            </div>
            <div class="signup">
                <p>Don't have an account? <a style="color: hotpink;" href="#">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
