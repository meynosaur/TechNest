<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Bayon&family=Dangrek&family=Fasthand&family=Fjalla+One&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=Metal&family=Moul&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap');
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: beige;
    }
    .box{
        width: 450px;
        height: 450px;
        background-color: black;
        box-shadow: rgba(0, 0, 0, 0.25) 0px 14px 28px, rgba(0, 0, 0, 0.22) 0px 10px 10px;
        font-family: "Roboto Condensed", sans-serif;
    }
    .box .top{
        display: flex;
        padding: 20px;
        font-size: 25px;
    }
    .top a{
        color: white;
        margin-right: 20px;
    }
    .top .eye{
        margin-left: 250px;
    }
    .box .img{
        width: 150px;
        height: 150px;
        margin: 20px auto;
        margin-top: -10px;
        position: relative;
    }
    .img img{
        width: 100%;
        height: 100%;
        border-radius: 50%;
    }
    .note{
        position: absolute;
        color: grey;
        background-color: rgb(65, 63, 63);
        width: 65px;
        height: 48px;
        text-align: center;
        padding-top: 6px;
        border-radius: 10px;
        top: -25px;
        right: 40px;
    }
    .circle{
        position: absolute;
        width: 8px;
        height: 8px;
        background-color: rgb(65, 63, 63);
        border-radius: 50%;
        top: 20px;
        right: 50px;
    }
    .circle1{
        position: absolute;
        width: 6px;
        height: 6px;
        background-color: rgb(65, 63, 63);
        border-radius: 50%;
        top: 28px;
        right: 60px;
    }
    .add-story{
        position: absolute;
        width: 25px;
        height: 25px;
        background-color: rgb(34, 178, 245);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        top: 120px;
        right: 15px;
        font-size: 20px;
        color: white;
        font-weight: bolder;
        border: 2px solid black;
        cursor: pointer;
    }
    .box .name{
        display: flex;
        justify-content: center;
        text-align: center;
        color: white;
        margin-top: -5px
    }
    .name h3{
        font-size: 18px;
    }
    .name a{
        color: white;
        font-size: 25px;
        margin-top: -2px;
    }
    .red-dot{
        position: absolute;
        width: 8px;
        height: 8px;
        background-color: red;
        border-radius: 50%;
        top: 470px;
        right: 940px;

    }
    .edit{
        position: absolute;
        color: rgb(194, 192, 192);
        font-size: 14px;
        width: 38px;
        height: 22px;
        top: 472px;
        right: 900px;
        background-color: rgb(53, 51, 51);
        border-radius: 5px;
        cursor: pointer;
        border-radius: 10px;
        padding-top: 2.6px;
    }
    .username{
        text-align: center;
        color: grey;
        font-size: 15px;
    }
    .number{
        display: flex;
        margin-top: 10px;
        color: white;
    }
    #num1{
        margin-left: 80px;
    }
    #num2{
        margin-left: 60px;
    }
    #num3{
        margin-left: 50px;
    }
    .number p{
        border-right: 1px solid rgb(65, 63, 63);
        padding-right: 49px;
    }
    .number p:last-child{
        border-right: none;
    }
    .info{
        display: flex;
        margin-top: 5px;
        color: grey;
        font-size: 14px;
    }
    #following{
        margin-left: 65px;
        margin-top: -5px;
    }
    #followers{
        margin-left: 80px;
        margin-top: -5px;
    }
    #likes{
        margin-left: 90px;
        margin-top: -5px;
    }
    .bio{
        text-align: center;
        color: rgb(194, 192, 192);
        margin-top: 15px;
        font-size: 14px;
    }
    .studio{
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
        color: white;
        position: relative;
    }
    .studio a{
        color: red;
        font-size: 20px;
        margin-right: 10px;
    }
    .studio .star{
        position: absolute;
        color: red;
        font-size: 10px;
        top: 10px;
        left: 185px;
    }
    .studio p{
        font-size: 14px;
    }
    .icons {
        display: flex;
        margin-top: 15px;
        font-size: 23px;
    }
    .icons a{
        color: rgb(87, 85, 85);
    }
    #grid{
        margin-left: 40px;
        color: white;
    }
    #lock{
        margin-left: 60px;
    }
    #repost{
        margin-left: 70px;
    }
    #bookmark{
        margin-left: 60px;
    }
    #heart{
        margin-left: 70px;
    }
    .down-arrow{
        position: relative;
    }
    .down-arrow a{
        color: white;
        font-size: 10px;
        position: absolute;
        font-size: 10px;
        bottom: 8px;
        left: 65px;
    }
    .line{
        margin-left: 35px;
        background-color: white;
        width: 8%;
        height: 2px;
    }
</style>
<body>
    <div class="box">
        <div class="top">
            <a href="#" class="user-plus">
                <i class='bx bx-user-plus'></i>
            </a>
            <a href="#" class="eye">
                <i class='bx bx-show-alt'></i>
            </a>
            <a href="#" class="share">
                <i class='bx bx-share'></i>
            </a>
            <a href="#" class="list">
                <i class='bx bx-list-ul'></i>
            </a>
        </div>
        <div class="img">
            <img src="pf1.jpg" alt="">
            <div class="note">
                Today's <br> mood?
            </div>
            <div class="circle"></div>
            <div class="circle1"></div>
            <div class="add-story">
                <i class='bx bx-plus' ></i>
            </div>
        </div>
        <div class="name">
            <h3>M</h3>
            <a href="#"><i class='bx bx-chevron-down' ></i></a>
            <div class="red-dot"></div>
            <div class="edit">Edit</div>
        </div>
        <div class="username">@meynosaur_</div>
        <div class="number">
            <p id="num1">393</p>
            <p id="num2">482</p>
            <p id="num3">7,193</p>
        </div>
        <div class="info">
            <p id="following">Following</p>
            <p id="followers">Followers</p>
            <p id="likes">Likes</p>
        </div>
        <div class="bio">
            just stfu and die
        </div>
        <div class="studio">
            <a href="#"><i class='bx bx-user' ></i></a>
            <a href="#" class="star"><i class='bx bxs-star' ></i></a>
            <p>TikTok Studio</p>
        </div>
        <div class="icons">
            <a href="#" id="grid"><i class='bx bxs-grid'></i></a>
            <a href="#" id="lock"><i class='bx bx-lock-alt' ></i></a>
            <a href="#" id="repost"><i class='bx bx-repost' ></i></a>
            <a href="#" id="bookmark"><i class='bx bx-bookmark' ></i></a>
            <a href="#" id="heart"><i class='bx bx-heart' ></i></a>
        </div>
        <div class="down-arrow">
            <a href="#"><i class='bx bxs-down-arrow' ></i></a>
        </div>
        <div class="line"></div>
    </div>
</body>
</html>
