<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    .red{
        width: 200px;
        height: 200px;
        background-color: red;
    }
    .green{
        width: 200px;
        height: 200px;
        background-color: green;
    }
    .yellow{
        width: 200px;
        height: 200px;
        background-color: yellow;
    }
    .button button{
        width: 200px;
        height: 50px;
        background-color: pink;
        color: white;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease-in;
    }
    .button button:hover{
        background-color: black;
        color: pink;
    }
</style>

<body>
    <div class="red"></div>
    <div class="green"></div>
    <div class="yellow"></div>
    <div class="button"><button>Crack me</button></div>
</body>
</html>
