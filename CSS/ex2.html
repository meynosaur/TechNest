<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bayon&family=Dangrek&family=Fasthand&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Metal&family=Moul&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        *{
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: "Oswald", sans-serif;
        }
        body{
            height: 100vh;
            background-color: antiquewhite;
            justify-content: center;
            align-items: center;
            display: flex;
        }
        .outer{
            display: flex;
            flex-direction: column;
            border: 2px solid deeppink;
            width: 500px;
            height: 800px;
            background-color: pink;
        }
        .outer .inner{
            border: 2px solid pink;
            width: 90%;
            height: 92%;
            margin-top: 32px;
            margin-left: 21px;
            border-radius: 20px;
            background-color: antiquewhite;
        }
        .inner .nail{
            width: 90%;
            height: 70%;
            margin-top: 20px;
            margin-left: 23px;
            border-radius: 50%;
            object-fit: cover;
        }
        .outer .info{
            margin-left: 60px;
            margin-top: -160px;
            display: flex;
            flex-direction: column;
        }
        .info .nail{
            font-size: 27px;
            font-weight: 500;
            color: deeppink;
        }
        .info .price{
            font-size: 17px;
            font-weight: 350;
        }
        .outer .buy-button{
            margin-top: 10px;
            margin-left: 60px;
        }
        .button{
            width: 100px;
            height: 35px;
            background-color: hotpink;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 20px;
        }
        .button:hover{
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
            <img src="https://i.pinimg.com/736x/74/06/ce/7406ce75009de97159d29efcea6e3ebe.jpg" alt="" class="nail">
        </div>
        <div class="info">
            <span class="nail">Pinky Nails</span>
            <span class="price">$9,5</span>
        </div>
        <div class="buy-button">
            <button class="button">Add to cart</button>
        </div>
    </div>
</body>
</html>
