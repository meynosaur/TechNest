<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container{
        width: 100%;
        height: 100vh;
    }
    .nav{
        width: 100%;
        height: 60px;
        padding: 0px 3px;
        background-color: #1B3351;
        display: flex;
        position: sticky;
        top: 0;
        justify-content: space-between;
    }
    .nav .logo{
        width: 130px;
        height: 100%;
        padding: 10px 5px;
    }
    .nav .logo img{
        width: 100%;
        height: 100%;
    }
    .nav .option ul{
        height: 100%;
        display: flex;
        align-items: center;
        gap: 60px;
    }
    li{
        color: white;
        list-style: none;
        font-size: 25px;
    }
    .menu{
        display: none;
    }
    .product{
        display: grid;
        grid-template-columns: repeat(4,360px);
        grid-template-rows: repeat(4,200px);
        gap: 20px;
    }
    .product div{
        background-color: aqua;
    }
    @media (max-width:1200px) {
        li{
            display: none;
        }
        .menu{
            display: flex;
        }
        .product{
            grid-template-columns: repeat(3,360px);
        }
    }
</style>
<body>
    <div class="container">
        <div class="nav">
            <div class="logo">
                <img src="https://www.acledabank.com.kh/kh/assets/layout/logo3.png" alt="">
            </div>
            <div class="option">
                <ul>
                    <li>Home</li>
                    <li>Contact</li>
                    <li>Setting</li>
                    <li>About</li>
                    <a href="#" class="menu"><i class='bx bx-menu'></i></a>
                </ul>
            </div>
        </div>
        <div class="product">
            <div class="product1"></div>
            <div class="product2"></div>
            <div class="product3"></div>
            <div class="product4"></div>
            <div class="product5"></div>
            <div class="product6"></div>
        </div>
    </div>
</body>
</html>
