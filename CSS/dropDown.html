<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Down</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .controller{
        width: 100px;
        height: 100px;
    }
    .btn{
        width: 100%;
        background-color: lightblue;
        border: none;
    }
    .controller:hover .container{
        height: 60px;
    }
    .container{
        width: 100%;
        height: 0;
        background-color: lightcoral;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: height 0.5s ease-in-out;
    }
</style>
<body>
    <div class="controller">
        <button class="btn">Dropdown</button>
        <div class="container">
            <a href="">Facebook</a>
            <a href="">TikTok</a>
            <a href="">Instagram</a>
        </div>
    </div>
</body>
</html>
