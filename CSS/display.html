<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        display: flex;
        gap: 50px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .controller{
        display: flex;
        justify-content: center;
        margin-top: 10px;
        width: 1200px;
        height: 170px;
        border: 1px solid black;
    }
    .navi{
        width: 99%;
        height: 90px;
        background-color: rgb(68, 126, 68);
        margin-top: 10px;
        display: flex;
        align-items: center;
    }
    .navi h2{
        color: white;
        margin-left: 50px;
        margin-right: 300px;
    }
    .button{
        display: flex;
        gap: 15px;
    }
    .button button{
        width: 100px;
        height: 40px;
        border-radius: 5px;
        border: none;
        background-color: rgb(68, 126, 68);
        cursor: pointer;
    }
    .button button.con{
        background-color: rgb(141, 196, 141);
    }
    .button button:first-child{
        background-color: rgb(63, 173, 63);
    }
    .button button i{
        color: white;
        font-size: 17px;
    }
    .button button span{
        color: white;
        font-size:17px;
    }
    .container{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 800px;
        height: 440px;
        border: 1px solid black;
    }
    .dot{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .header{
        margin-top: 3px;
        height: 10%;
        width: 780px;
        background-color: rgb(241, 8, 144);
    }
    .navigate{
        height: 10%;
        width: 780px;
        background-color: rgb(240, 74, 171);
    }
    .middle{
        display: flex;
        gap: 5px;
    }
    .aside{
        width: 276px;
        height: 280px;
        background-color: rgb(250, 126, 198);
    }
    .inner{
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    .content{
        width: 500px;
        height: 137px;
        background-color: rgb(247, 142, 203);
    }
    .section{
        width: 500px;
        height: 137px;
        background-color: rgb(240, 170, 211);
    }
    .footer{
        height: 10%;
        width: 780px;
        background-color: rgb(243, 211, 230);
    }
    .container .dot h1{
        color: white;
    }
</style>
<body>
    <div class="controller">
        <div class="navi">
            <h2>E-COMMERCE</h2>
            <div class="button">
                <button>
                    <i class='bx bx-home'></i>
                    <span>Home</span>
                </button>
                <button>
                    <i class='bx bx-id-card' ></i>
                    <span>About us</span>
                </button>
                <button><span>Skill</span></button>
                <button><span>Project</span></button>
                <button class="con"><span>Contact</span></button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="dot header"><h1>Header</h1></div>
        <div class="dot navigate"><h1>Naigate</h1></div>
        <div class="dot middle">
            <div class="dot aside"><h1>Aside</h1></div>
            <div class="dot inner">
                <div class="dot content"><h1>Content</h1></div>
                <div class="dot section"><h1>Section</h1></div>
            </div>
        </div>
        <div class="dot footer"><h1>Footer</h1></div>
    </div>
</body>
</html>
