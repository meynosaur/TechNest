<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="ex11.css">
</head>
<body>
    <div class="controller">
        <div class="control">
            <div class="card">
                <img src="doctor.png" alt="">
                <div class="top">
                    <span class="time">01:68</span>
                    <div class="middle"><span></span></div>
                    <a class="signal" href="#"><i class='bx bx-signal-4'></i></a>
                    <a class="wifi" href="#"><i class='bx bx-wifi' ></i></a>
                    <a class="battery" href="#"><i class='bx bx-battery' ></i></a>
                </div>
                <div class="icon1">
                    <a class="arrow" href="#"><i class='bx bx-chevron-left' ></i></a>
                    <a class="heart" href="#"><i class='bx bx-heart' ></i></a>
                </div>
                <div class="blur">
                    <div class="profile">
                        <Label class="name">Ashlee Wilson</Label><br>
                        <Label class="job">Neurologist</Label>
                        <span class="star">
                            <a href="#"><i class='bx bxs-star' ></i></a>
                            4.8
                        </span>
                    </div>
                    <div class="icon">
                        <a class="msg" href="#"><i class='bx bx-message-rounded-dots' ></i></a>
                        <a class="phone" href="#"><i class='bx bx-phone' ></i></a>
                        <a class="vdo" href="#"><i class='bx bx-video' ></i></a>
                    </div>
                </div>
            </div>
            <div class="bottom">
                <div class="period">
                    <a href="#"><i class='bx bx-time-five' ></i></a>
                    <span class="above">8 years</span><br>
                    <span class="below">Experience</span>
                </div>
                <div class="patient">
                    <a href="#"><i class='bx bx-group'></i></a>
                    <span class="above">16.8k+</span><br>
                    <span class="below">Patients</span>
                </div>
                <div class="review">
                    <a href="#"><i class='bx bx-star' ></i></a>
                    <span class="above">4.8</span><br>
                    <span class="below">Reviews</span>
                </div>
                </div>
        </div>
        <div class="select"><span>Select Date</span></div>
        <div class="mth">
            <Label>October</Label>
            <Label class="nov">November</Label>
            <Label>December</Label>
            <Label>January</Label>
            <Label>February</Label>
        </div>
        <div class="date">
            <div class="small1">
                <span class="num num28">2</span><br>
                <span>Sun</span>
            </div>
            <div class="small2">
                <span class="num num37">3</span><br>
                <span>Mon</span>
            </div>
            <div class="small3">
                <span class="num num46">4</span><br>
                <span>Tue</span>
            </div>
            <div class="big">
                <div class="center">
                    <span class="num num5">5</span><br>
                    <span>Wed</span>
                </div>
            </div>
            <div class="small3">
                <span class="num num46">6</span><br>
                <span>Thu</span>
            </div>
            <div class="small2">
                <span class="num num37">7</span><br>
                <span>Fri</span>
            </div>
            <div class="small1">
                <span class="num num28">8</span><br>
                <span>Sat</span>
            </div>
            <span class="dot"></span>
        </div>
        <div class="selectt"><span>Selet Time</span></div>
        <div class="time">
            <div class="one once">
                <a href="#"><i class='bx bx-time'></i></a>
                <span>10:30AM</span>
            </div>
            <div class="one">
                <a href="#"><i class='bx bx-time'></i></a>
                <span>11:00AM</span>
            </div>
            <div class="one">
                <a href="#"><i class='bx bx-time'></i></a>
                <span>12:00PM</span>
            </div>
            <div class="one">
                <a href="#"><i class='bx bx-time'></i></a>
                <span>01:00PM</span>
            </div>
        </div>
        <div class="button">
            <button>Book Appointment - $15/hr</button>
        </div>
        <span class="line"></span>
    </div>
</body>
</html>
